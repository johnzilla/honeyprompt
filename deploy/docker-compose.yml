services:
  honeyprompt:
    image: ghcr.io/johnzilla/honeyprompt:latest
    volumes:
      - hp-db:/landing/.honeyprompt
    restart: always

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: always

volumes:
  hp-db:
  caddy-data:
  caddy-config:
